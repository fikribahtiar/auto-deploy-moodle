services:

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: moodle
      POSTGRES_USER: moodle
      POSTGRES_PASSWORD: moodle
    volumes:
      - db_data:/var/lib/postgresql/data

  moodle:
    build: .
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      MOODLE_DB_TYPE: pgsql
      MOODLE_DB_HOST: db
      MOODLE_DB_NAME: moodle
      MOODLE_DB_USER: moodle
      MOODLE_DB_PASS: moodle
    volumes:
      - moodledata:/var/moodledata

volumes:
  db_data:
  moodledata: